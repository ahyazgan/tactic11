<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tactic11 — Çevrimdışı</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    :root {
      --bg: #eaf0ea; --panel: #f7faf7; --ink: #1a1f2e;
      --muted: #5a6276; --accent: #1e6b41; --line: #d5e0d5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg);
      color: var(--ink); display: flex; align-items: center;
      justify-content: center; padding: 20px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue",
        Arial, sans-serif;
    }
    .card {
      max-width: 460px; background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; padding: 32px 28px; text-align: center;
      box-shadow: 0 6px 24px rgba(16, 24, 40, 0.08);
    }
    .icon { font-size: 48px; line-height: 1; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
    .lead { color: var(--muted); font-size: 14px; line-height: 1.55;
      margin-bottom: 20px; }
    .actions { display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; }
    button {
      padding: 10px 18px; border: none; border-radius: 6px;
      background: var(--accent); color: white; font-size: 13px;
      font-weight: 700; cursor: pointer; min-height: 44px;
    }
    button.secondary {
      background: transparent; color: var(--ink);
      border: 1px solid var(--line);
    }
    .tip {
      margin-top: 18px; font-size: 11.5px; color: var(--muted);
      line-height: 1.5;
    }
    code {
      background: rgba(30,107,65,0.10); padding: 1px 6px; border-radius: 3px;
      font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 11px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">📡</div>
    <h1>İnternet bağlantısı yok</h1>
    <p class="lead">
      Maç-içi karar paneli son snapshot'u gösterir; ağ döndüğünde
      otomatik tazelenir. Mobil veri / Wi-Fi durumunu kontrol et.
    </p>
    <div class="actions">
      <button onclick="location.reload()">Yeniden Dene</button>
      <button class="secondary" onclick="history.back()">Geri Dön</button>
    </div>
    <p class="tip">
      İpucu: Geri dönüp <code>/decisions/live</code> sayfasını açtıysan
      son ŞİMDİ kararı service worker cache'inden okunur.
    </p>
  </main>
</body>
</html>
