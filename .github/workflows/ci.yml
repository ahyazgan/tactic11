name: ci

on:
  push:
    branches: [main]
  pull_request:

# PR'a tekrar push gelirse çalışan job'u iptal et — quota tasarrufu.
# main push/re-run'larında İPTAL ETME: aksi halde merge'ler ve re-run'lar
# aynı concurrency grubunda birbirini cancel'lar (yeşile dönemez).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt
      - name: ruff
        run: ruff check app/ scripts/ tests/
      - name: mypy
        run: mypy app/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt
      - name: pytest
        run: pytest -q

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt
      - name: alembic upgrade head (sqlite smoke)
        env:
          DATABASE_URL: "sqlite:///./_ci.db"
        run: alembic upgrade head
      - name: alembic downgrade base + upgrade head (roundtrip)
        env:
          DATABASE_URL: "sqlite:///./_ci.db"
        run: |
          alembic downgrade base
          alembic upgrade head

  docker_build:
    runs-on: ubuntu-latest
    # Dockerfile değişirse veya main'e merge'de doğrula; PR'larda da
    # opsiyonel ama hızlı (Docker layer cache).
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          # docker driver = daemon'ın gömülü buildkit'i; moby/buildkit imajı
          # Docker Hub'dan ÇEKİLMEZ → flaky 'pulling buildkit ... timeout' yok.
          driver: docker
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: manager2:ci
          # NOT: gha cache (type=gha) docker driver'da desteklenmez; reliability
          # için layer cache'ten feragat edildi (smoke build hızlı zaten).
      - name: smoke — image starts
        run: |
          # Container short-lived: just verify entrypoint module imports.
          # DATABASE_URL fake (no real DB) — uvicorn boot olmaz ama import OK olmalı.
          docker run --rm --entrypoint python manager2:ci -c \
            "import app.api.main; print('import ok, version=', app.api.main.APP_VERSION)"
