name: ci

on:
  push:
    branches: [main]
  pull_request:

# Aynı PR'a tekrar push gelirse çalışan job'u iptal et — quota tasarrufu.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt
      - name: ruff
        run: ruff check app/ scripts/ tests/
      - name: mypy
        run: mypy app/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt
      - name: pytest
        run: pytest -q

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt
      - name: alembic upgrade head (sqlite smoke)
        env:
          DATABASE_URL: "sqlite:///./_ci.db"
        run: alembic upgrade head
      - name: alembic downgrade base + upgrade head (roundtrip)
        env:
          DATABASE_URL: "sqlite:///./_ci.db"
        run: |
          alembic downgrade base
          alembic upgrade head
