name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: install
        run: pip install --disable-pip-version-check -r requirements-dev.txt

      - name: ruff (lint)
        run: ruff check app/ scripts/ tests/

      - name: mypy (type check)
        run: mypy app/ scripts/

      - name: pytest
        run: pytest -q

      - name: alembic upgrade head (sqlite smoke)
        env:
          DATABASE_URL: "sqlite:///./_ci.db"
        run: alembic upgrade head
